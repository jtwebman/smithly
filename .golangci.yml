run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - gocritic
    - misspell
    - nilerr
    - bodyclose
    - durationcheck
    - copyloopvar
    - makezero
    - noctx
    - predeclared
    - unconvert
    - wastedassign

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - commentedOutCode
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (net.Conn).Close

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - noctx
        - predeclared
